<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StockWatch inventory attention dashboard" />
    <title>StockWatch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-lockup" aria-label="StockWatch">
        <span class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
        <span>StockWatch</span>
      </div>

      <div class="briefing-layout">
        <div>
          <p class="eyebrow">Daily inventory briefing</p>
          <h1>Good morning, Alicia.</h1>
          <p class="briefing">
            Here is what needs your attention today.
          </p>
        </div>
        <p class="demo-date">
          <span>Demo inventory date</span>
          <time datetime="2026-07-22">July 22, 2026</time>
        </p>
      </div>
    </header>

    <main
      class="dashboard"
      id="app"
      aria-busy="true"
      aria-live="polite"
    ></main>

    <script type="module" src="script.js"></script>
  </body>
</html>
