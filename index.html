<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StockWatch inventory attention dashboard" />
    <title>StockWatch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <p class="eyebrow">Inventory attention dashboard</p>
      <h1>StockWatch</h1>
      <p>See which products need your attention today.</p>
    </header>

    <main class="dashboard" id="app">
      <section class="summary" aria-labelledby="summary-heading">
        <h2 id="summary-heading">Today’s Inventory Summary</h2>
        <div class="summary-grid" aria-label="Inventory alert summary">
          <article class="summary-card"><span>Low stock</span><strong>—</strong></article>
          <article class="summary-card"><span>Expiring soon</span><strong>—</strong></article>
          <article class="summary-card"><span>Urgent</span><strong>—</strong></article>
        </div>
      </section>

      <section class="products" aria-labelledby="products-heading">
        <div class="section-heading">
          <h2 id="products-heading">Products</h2>
          <p>Product details and recommended actions will appear here.</p>
        </div>
        <div class="product-list" id="product-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
